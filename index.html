<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gauntlet Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Pirata+One&family=New+Rocker&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0a0a0f; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Ubuntu', sans-serif; 
            overflow: hidden; 
        }
        /* Container to stack Video and Canvas */
        #game-container {
            position: relative;
            width: 960px;
            height: 650px;
            border: 4px solid #464664;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        /* Image stays at the bottom */
        #bgImageLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Canvas stays on top and MUST be transparent */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            background-color: transparent; /* Vital for seeing the video */
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <img id="bgImageLayer" src="assets/Background_001.png" alt="Background">
        <canvas id="gameCanvas" width="960" height="650"></canvas>
    </div>

    <script src="js/data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/state.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
